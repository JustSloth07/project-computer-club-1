<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>PUO Digital Map</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  </head>

  <body>
    <!-- Toggle Button (Minimize/Maximize) -->
    <button class="panel-toggle-btn" onclick="togglePanel()">☰</button>

    <div class="top-panel" id="top-panel">
      <button onclick="toggleSatellite()">Satellite View</button>

      <h2>Politeknik Ungku Omar</h2>
      <p class="subtitle">Digital Campus Map</p>

      <div class="row">
        <input type="text" id="searchBox" placeholder="Search location..." />
        <button onclick="searchLocation()">Search</button>
      </div>

      <div class="row">
        <button onclick="getMyLocation()" style="flex:1;">My Location</button>
        <select id="destination" style="flex:1;">
          <option value="">-- Select Destination --</option>
        </select>
        <button onclick="startDirection()" style="flex:1;">Direction</button>
      </div>
    </div>

    <div id="map"></div>

    <!-- Single detailModal wrapper -->
    <div id="detailModal"
         style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
                background:rgba(0,0,0,0.6); z-index:9999;">

      <!-- Modal box -->
      <div style="
    background: #fff; 
    width: 90%; 
    max-width: 450px; 
    margin: 0; 
    padding: 20px; 
    border-radius: 12px; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    max-height: 85vh; 
    overflow-y: auto; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 9999;
">
    <button onclick="closeDetails()" style="
        background: #1e88e5; 
        color: white; 
        border: none; 
        padding: 8px 15px; 
        border-radius: 8px; 
        cursor: pointer; 
        margin-bottom: 15px;
        font-weight: bold;
    ">❌ Close</button>
    
    <div id="detailContent" style="color: #333; line-height: 1.6;">
        </div>
</div>

    <!-- JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="java.js"></script>
  </body>
</html>
